mission_manager_node:
  ros__parameters:
    target_latitude: 39.776030
    target_longitude: 30.520030
    target_altitude: 0.0
    acceptance_radius: 0.05
    goal_id: "goal_1"
    autonomous_enabled: true
    publish_rate_hz: 1.0

gps_data_node:
  ros__parameters:
    odom_topic: "/odom"
    reference_latitude: 39.776000
    reference_longitude: 30.520000
    reference_altitude: 0.0
    gps_noise_std_m: 0.0
    satellite_count: 18
    horizontal_accuracy: 0.02
    fix_type: "RTK_FIXED"
    publish_rate_hz: 5.0

imu9250_node:
  ros__parameters:
    odom_topic: "/odom"
    publish_rate_hz: 30.0
    mag_field_strength: 0.00005

heading_node:
  ros__parameters:
    use_imu_orientation: true
    mag_mount_offset_deg: 0.0
    magnetic_declination_deg: 0.0
    publish_rate_hz: 20.0
    heading_timeout: 1.0

navigation_node:
  ros__parameters:
    heading_threshold_deg: 8.0
    default_acceptance_radius: 0.05
    forward_pulse_duration: 0.08
    turn_pulse_duration: 0.06
    forward_speed: 0.08
    turn_speed: 0.12
    decision_rate_hz: 8.0
    require_rtk_fixed: false
    gps_timeout: 2.0
    heading_timeout: 1.0

motor_control_node:
  ros__parameters:
    cmd_vel_topic: "/cmd_vel"
    watchdog_timeout: 1.0
    status_rate_hz: 10.0
